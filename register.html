<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<br><br>

<table align="center">
    <tr>
        <td align="center">

            <h1>Registration Form</h1>

            <form id="register-form">

                <input
                    type="text"
                    id="reg-name"
                    placeholder="User Name"
                    name="uname"
                    required
                >
                <br><br>

                <input
                    type="email"
                    id="reg-email"
                    placeholder="Email ID"
                    name="mailid"
                    required
                >
                <br><br>

                <input
                    type="password"
                    id="reg-password"
                    placeholder="Password"
                    name="password"
                    required
                >
                <br><br>

                <select id="reg-role" name="role">
                    <option value="ADMIN">ADMIN</option>
                    <option value="PATIENT" selected>PATIENT</option>
                    
                </select>

                <br><br>

                <div id="reg-error"
                    style="color:red; margin-bottom:10px; display:none;">
                </div>

                <div id="reg-success"
                    style="color:green; margin-bottom:10px; display:none;">
                </div>

                <button type="submit" id="reg-btn">
                    Register
                </button>

                <br><br>

                <a href="login.html">
                    Already have an account? Click here to Login
                </a>

            </form>

        </td>
    </tr>
</table>

<script>

const API_BASE = "https://medmatch-fullstackbackend.onrender.com";

document.getElementById("register-form").addEventListener("submit", async function(e){

    e.preventDefault();

    const name = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const role = document.getElementById("reg-role").value;

    const errDiv = document.getElementById("reg-error");
    const sucDiv = document.getElementById("reg-success");
    const btn = document.getElementById("reg-btn");

    errDiv.style.display = "none";
    sucDiv.style.display = "none";

    if(!name || !email || !password){

        errDiv.textContent = "Please fill in all required fields.";
        errDiv.style.display = "block";
        return;
    }

    if(password.length < 6){

        errDiv.textContent = "Password must be at least 6 characters.";
        errDiv.style.display = "block";
        return;
    }

    btn.textContent = "Registering...";
    btn.disabled = true;

    try{

        const res = await fetch(API_BASE + "/Medmatch/auth/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name:name,
                email:email,
                password:password,
                role:role

            })

        });

        if(res.ok){

            sucDiv.textContent = "Registration Successful! Redirecting to login...";
            sucDiv.style.display = "block";

            document.getElementById("register-form").reset();

            setTimeout(function(){

                window.location.href = "login.html";

            },1500);

        }else{

            const data = await res.json().catch(function(){

                return {};

            });

            errDiv.textContent =
                data.message || "Registration failed. Email may already be in use.";

            errDiv.style.display = "block";
        }

    }catch(err){

        errDiv.textContent =
            "Cannot connect to server. Make sure backend is running on port 8080.";

        errDiv.style.display = "block";

    }finally{

        btn.textContent = "Register";
        btn.disabled = false;
    }

});

</script>

</body>
</html>
